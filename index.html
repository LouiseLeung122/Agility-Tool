<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="反应启动">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>网球反应启动训练</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101e;
      --panel: #111e30;
      --line: #314159;
      --text: #f8fafc;
      --muted: #b9c4d3;
      --accent: #b9ff38;
      --danger: #ff5d57;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button, input { font: inherit; }

    button {
      min-height: 56px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible, input:focus-visible {
      outline: 4px solid #fff;
      outline-offset: 2px;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px
        max(20px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 7vw, 36px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      padding: 14px;
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 16px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    input[type="number"] {
      width: 100%;
      min-height: 52px;
      padding: 7px 10px;
      border: 2px solid #63738a;
      border-radius: 10px;
      background: #050b13;
      color: #fff;
      font-size: 25px;
      font-weight: 800;
      text-align: center;
    }

    .stage {
      flex: 1;
      min-height: 350px;
      padding: 20px;
      background: var(--panel);
      border: 3px solid var(--line);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
    }

    .stage.active { border-color: var(--accent); }

    .status-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .status {
      color: var(--accent);
      letter-spacing: .08em;
    }

    .cue {
      margin: auto 0;
      line-height: .9;
    }

    .direction {
      min-height: 1em;
      font-size: clamp(78px, 26vw, 150px);
      font-weight: 950;
      letter-spacing: .04em;
    }

    .arrow {
      min-height: 1em;
      margin-top: 18px;
      color: var(--accent);
      font-family: Arial, sans-serif;
      font-size: clamp(80px, 30vw, 170px);
      font-weight: 900;
    }

    .timer-label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .timer {
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-size: 40px;
      font-weight: 900;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .primary {
      grid-column: 1 / -1;
      background: var(--accent);
      color: #08101c;
      font-size: 22px;
    }

    .secondary {
      background: #223149;
      border-color: #52647e;
      color: #fff;
    }

    .danger {
      background: transparent;
      border-color: var(--danger);
      color: #ff8b87;
    }

    .install {
      grid-column: 1 / -1;
      background: #fff;
      color: #08101c;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .38;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-height: 700px) {
      .app { gap: 12px; padding-top: 12px; }
      .subtitle, .hint { display: none; }
      .stage { min-height: 300px; padding: 14px; }
      .direction { font-size: 74px; }
      .arrow { font-size: 86px; margin-top: 10px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>网球反应启动训练</h1>
      <p class="subtitle">看方向，快速启动、刹停、回中心。</p>
    </header>

    <section class="settings" aria-label="训练参数">
      <div class="field">
        <label for="intervalInput">播报间隔（秒）</label>
        <input id="intervalInput" type="number" min="0.5" max="60" step="0.5" value="2" inputmode="decimal">
      </div>
      <div class="field">
        <label for="totalInput">播报次数</label>
        <input id="totalInput" type="number" min="1" max="999" step="1" value="20" inputmode="numeric">
      </div>
    </section>

    <section id="stage" class="stage" aria-live="polite">
      <div class="status-row">
        <span id="status" class="status">待开始</span>
        <span id="progress">0 / 20</span>
      </div>

      <div class="cue">
        <div id="direction" class="direction">准备</div>
        <div id="arrow" class="arrow">•</div>
      </div>

      <div>
        <div id="timerLabel" class="timer-label">训练前倒计时</div>
        <div id="timer" class="timer">5.0</div>
      </div>
    </section>

    <section class="controls" aria-label="训练控制">
      <button id="startButton" class="primary" type="button">开始</button>
      <button id="pauseButton" class="secondary" type="button" disabled>暂停</button>
      <button id="stopButton" class="danger" type="button" disabled>停止</button>
      <button id="resetButton" class="secondary" type="button">重置</button>
      <button id="installButton" class="install" type="button">安装到手机</button>
    </section>

    <p class="hint">首次点击开始会启用语音。若设备不支持语音，方向仍会以大字和箭头显示。</p>
  </main>

  <script>
    (() => {
      'use strict';

      const PREP_SECONDS = 5;
      const DIRECTIONS = [
        { name: '左', arrow: '←' },
        { name: '右', arrow: '→' },
        { name: '前', arrow: '↑' },
        { name: '后', arrow: '↓' }
      ];

      const elements = {
        interval: document.querySelector('#intervalInput'),
        total: document.querySelector('#totalInput'),
        stage: document.querySelector('#stage'),
        status: document.querySelector('#status'),
        progress: document.querySelector('#progress'),
        direction: document.querySelector('#direction'),
        arrow: document.querySelector('#arrow'),
        timerLabel: document.querySelector('#timerLabel'),
        timer: document.querySelector('#timer'),
        start: document.querySelector('#startButton'),
        pause: document.querySelector('#pauseButton'),
        stop: document.querySelector('#stopButton'),
        reset: document.querySelector('#resetButton')
      };

      const installButton = document.querySelector('#installButton');
      let deferredInstallPrompt = null;

      // 所有计时均由这一个 requestAnimationFrame 循环驱动。
      const state = {
        phase: 'idle', // idle | countdown | training | complete
        paused: false,
        intervalMs: 2000,
        total: 20,
        count: 0,
        deadline: 0,
        remainingMs: PREP_SECONDS * 1000,
        frameId: null,
        lastDirectionIndex: -1
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function readSettings() {
        const seconds = clamp(Number(elements.interval.value) || 2, 0.5, 60);
        const total = Math.round(clamp(Number(elements.total.value) || 20, 1, 999));
        elements.interval.value = String(seconds);
        elements.total.value = String(total);
        state.intervalMs = seconds * 1000;
        state.total = total;
      }

      function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.05;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
      }

      function stopSpeech() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      }

      function setControls(running) {
        elements.interval.disabled = running;
        elements.total.disabled = running;
        elements.start.disabled = running;
        elements.pause.disabled = !running;
        elements.stop.disabled = !running;
        elements.reset.disabled = running;
      }

      function render() {
        const seconds = Math.max(0, state.remainingMs) / 1000;
        elements.progress.textContent = `${state.count} / ${state.total}`;
        elements.timer.textContent = seconds.toFixed(1);
        elements.stage.classList.toggle('active', state.phase === 'training' && !state.paused);

        if (state.paused) {
          elements.status.textContent = '已暂停';
          elements.pause.textContent = '继续';
          return;
        }

        elements.pause.textContent = '暂停';
        if (state.phase === 'idle') {
          elements.status.textContent = '待开始';
          elements.timerLabel.textContent = '训练前倒计时';
        } else if (state.phase === 'countdown') {
          elements.status.textContent = '准备';
          elements.timerLabel.textContent = '训练前倒计时';
        } else if (state.phase === 'training') {
          elements.status.textContent = '训练中';
          elements.timerLabel.textContent = state.count >= state.total
            ? '最后方向展示'
            : '距离下次播报';
        } else if (state.phase === 'complete') {
          elements.status.textContent = '完成';
          elements.timerLabel.textContent = '训练结束';
        }
      }

      function cancelClock() {
        if (state.frameId !== null) cancelAnimationFrame(state.frameId);
        state.frameId = null;
      }

      function scheduleClock() {
        cancelClock();
        state.frameId = requestAnimationFrame(tick);
      }

      function tick(now) {
        if (state.paused || (state.phase !== 'countdown' && state.phase !== 'training')) {
          state.frameId = null;
          return;
        }

        state.remainingMs = Math.max(0, state.deadline - now);

        if (state.remainingMs <= 0) {
          if (state.phase === 'countdown') {
            beginTraining(now);
          } else {
            announceDirection(now);
          }
        }

        render();
        if (state.phase === 'countdown' || state.phase === 'training') {
          state.frameId = requestAnimationFrame(tick);
        } else {
          state.frameId = null;
        }
      }

      function beginTraining(now) {
        state.phase = 'training';
        state.remainingMs = 0;
        elements.direction.textContent = '开始';
        elements.arrow.textContent = '•';
        // 倒计时结束即播报第一次，不再额外等待一个间隔。
        announceDirection(now);
      }

      function announceDirection(now) {
        if (state.count >= state.total) {
          finishTraining();
          return;
        }

        let index;
        do {
          index = Math.floor(Math.random() * DIRECTIONS.length);
        } while (DIRECTIONS.length > 1 && index === state.lastDirectionIndex);

        state.lastDirectionIndex = index;
        state.count += 1;
        const cue = DIRECTIONS[index];
        elements.direction.textContent = cue.name;
        elements.arrow.textContent = cue.arrow;
        speak(cue.name);

        state.remainingMs = state.intervalMs;
        state.deadline = now + state.intervalMs;
      }

      function finishTraining() {
        cancelClock();
        state.phase = 'complete';
        state.paused = false;
        state.remainingMs = 0;
        elements.direction.textContent = '完成';
        elements.arrow.textContent = '✓';
        setControls(false);
        speak('完成');
        render();
      }

      function startTraining() {
        readSettings();
        stopSpeech();
        state.phase = 'countdown';
        state.paused = false;
        state.count = 0;
        state.remainingMs = PREP_SECONDS * 1000;
        state.lastDirectionIndex = -1;
        state.deadline = performance.now() + state.remainingMs;
        elements.direction.textContent = '准备';
        elements.arrow.textContent = '•';
        setControls(true);
        render();
        scheduleClock();
      }

      function togglePause() {
        if (state.phase !== 'countdown' && state.phase !== 'training') return;

        if (!state.paused) {
          state.remainingMs = Math.max(0, state.deadline - performance.now());
          state.paused = true;
          cancelClock();
          stopSpeech();
        } else {
          state.paused = false;
          state.deadline = performance.now() + state.remainingMs;
          scheduleClock();
        }
        render();
      }

      function returnToInitial(useDefaults = false) {
        cancelClock();
        stopSpeech();
        if (useDefaults) {
          elements.interval.value = '2';
          elements.total.value = '20';
        }
        readSettings();
        state.phase = 'idle';
        state.paused = false;
        state.count = 0;
        state.remainingMs = PREP_SECONDS * 1000;
        state.lastDirectionIndex = -1;
        elements.direction.textContent = '准备';
        elements.arrow.textContent = '•';
        setControls(false);
        render();
      }

      elements.start.addEventListener('click', startTraining);
      elements.pause.addEventListener('click', togglePause);
      elements.stop.addEventListener('click', () => returnToInitial(false));
      elements.reset.addEventListener('click', () => returnToInitial(true));
      elements.total.addEventListener('input', () => {
        const preview = Math.round(clamp(Number(elements.total.value) || 20, 1, 999));
        elements.progress.textContent = `0 / ${preview}`;
      });

      document.addEventListener('visibilitychange', () => {
        // 切到后台时自动暂停，防止用户回来后错过方向。
        if (document.hidden && !state.paused &&
            (state.phase === 'countdown' || state.phase === 'training')) {
          togglePause();
        }
      });

      // Android/桌面 Chrome 会提供原生安装提示。
      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installButton.hidden = false;
      });

      window.addEventListener('appinstalled', () => {
        deferredInstallPrompt = null;
        installButton.hidden = true;
      });

      installButton.addEventListener('click', async () => {
        if (deferredInstallPrompt) {
          deferredInstallPrompt.prompt();
          await deferredInstallPrompt.userChoice;
          deferredInstallPrompt = null;
          return;
        }

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS) {
          alert('请点击 Safari 底部的“分享”按钮，然后选择“添加到主屏幕”。');
        } else {
          alert('请打开浏览器菜单，选择“安装应用”或“添加到主屏幕”。');
        }
      });

      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        installButton.hidden = true;
      }

      // Service Worker 只能在 HTTPS 或 localhost 下注册。
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch((error) => {
            console.warn('离线功能注册失败：', error);
          });
        });
      }

      returnToInitial(false);
    })();
  </script>
</body>
</html>
